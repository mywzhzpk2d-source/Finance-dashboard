name: Update market data

on:
  schedule:
    - cron: '30 23 * * 0-4'
    - cron: '0 4 * * 1-5'
    - cron: '0 8 * * 1-5'
    - cron: '30 12 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run updater
        run: python scripts/update_market_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market-data.json
          git diff --staged --quiet || git commit -m "Update market data"
          git push
